apis:
  - aid: itch-io:itch-io-api
    name: Itch.io API
    description: >-
      The itch.io server-side API provides authenticated access to user
      profiles, uploaded games, download key validation, purchase lookup, and
      build version retrieval. Authentication is via API key or short-lived JWT
      tokens using the Authorization Bearer header. Responses are JSON with
      snake_case naming and RFC 3339 dates.
    humanURL: https://itch.io/docs/api/overview
    baseURL: https://api.itch.io
