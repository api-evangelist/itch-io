aid: itch-io
name: Itch.io
description: >-
  Itch.io is an indie game marketplace and community platform where developers
  can publish, sell, and distribute games, assets, and creative tools. Its REST
  API provides authenticated access to game metadata, developer profile
  information, bundle and download key management, purchase verification,
  community ratings, and game distribution data. The API supports OAuth 2.0
  implicit flow and API key authentication to enable integrations with developer
  tools, game launchers, and third-party services.
